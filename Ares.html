/* ==========================================================
                    ARES DESIGN SYSTEM
========================================================== */

:root{

    /* Colors */

    --background:#05070E;
    --surface:#0B1020;
    --surface-2:#111827;

    --primary:#5EEBFF;
    --secondary:#2B7FFF;
    --accent:#8A6DFF;

    --text:#FFFFFF;
    --text-secondary:#B8C3D6;

    --border:rgba(255,255,255,.08);

    --glass:rgba(255,255,255,.05);

    --glass-border:rgba(255,255,255,.10);

    --shadow:0 15px 45px rgba(0,0,0,.35);

    --radius:22px;

    --transition:.35s ease;

}

/* ==========================================================
                    RESET
========================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{

    scroll-behavior:smooth;

}

body{

    background:var(--background);

    color:var(--text);

    font-family:"Inter",sans-serif;

    overflow-x:hidden;

    min-height:100vh;

}

/* ==========================================================
                  TYPOGRAPHY
========================================================== */

h1,h2,h3{

    font-family:"Space Grotesk",sans-serif;

}

.logo{

    font-family:"Cinzel",serif;

    font-size:2rem;

    letter-spacing:3px;

    color:var(--primary);

}

p{

    color:var(--text-secondary);

    line-height:1.8;

}

/* ==========================================================
                     LINKS
========================================================== */

a{

    color:inherit;

    text-decoration:none;

}

/* ==========================================================
                     BUTTONS
========================================================== */

button{

    cursor:pointer;

    border:none;

    outline:none;

    font-family:inherit;

}

/* ==========================================================
                     LISTS
========================================================== */

ul{

    list-style:none;

}

/* ==========================================================
                 IMAGES
========================================================== */

img{

    display:block;

    max-width:100%;

}

/* ==========================================================
                 BACKGROUND
========================================================== */

#background{

    position:fixed;

    inset:0;

    z-index:-100;

    overflow:hidden;

}

#particles-layer,
#aurora-layer,
#grid-layer{

    position:absolute;

    inset:0;

}

/* ==========================================================
                 LOADING SCREEN
========================================================== */

#loading-screen{

    position:fixed;

    inset:0;

    background:var(--background);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:30px;

    z-index:99999;

}

.loading-logo h1{

    font-size:5rem;

    letter-spacing:12px;

    color:var(--primary);

}

.loading-logo p{

    text-align:center;

    letter-spacing:6px;

}

.loading-bar{

    width:260px;

    height:5px;

    border-radius:999px;

    overflow:hidden;

    background:rgba(255,255,255,.08);

}

.loading-progress{

    width:15%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)
    );

}

/* ==========================================================
                    NAVBAR
========================================================== */

#navbar{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:80px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 8%;

    backdrop-filter:blur(20px);

    background:rgba(5,7,14,.55);

    border-bottom:1px solid var(--border);

    z-index:999;

}

.nav-links{

    display:flex;

    gap:40px;

}

.nav-links a{

    transition:var(--transition);

    color:var(--text-secondary);

}

.nav-links a:hover{

    color:var(--primary);

}

#mobile-menu{

    display:none;

    background:none;

    color:white;

    font-size:1.4rem;

}

                     HERO
========================================================== */

    min-height:100vh;

    display:grid;

    grid-template-columns:1fr 1fr;

    align-items:center;

    padding:130px 8%;

    gap:80px;

}

.hero-left{

    display:flex;

    flex-direction:column;

    gap:25px;

}

.badge{

    width:max-content;

    padding:10px 18px;

    border-radius:999px;

    border:1px solid var(--glass-border);

.hero-buttons{

    gap:18px;

.hero-buttons button{

    border-radius:999px;

    transition:var(--transition);

}

.hero-buttons button:first-child{

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)

    font-weight:700;

}

.hero-buttons button:last-child{

    color:white;

    border:1px solid var(--glass-border);

.particle{

    position:absolute;

    width:4px;

    height:4px;

    border-radius:50%;

    background:rgba(94,235,255,.8);

    box-shadow:
        0 0 10px rgba(94,235,255,.6),

    animation:
        particleFloat linear infinite;

}

    0%{

        transform:
            translateY(120vh)
            scale(.4);

        opacity:0;

    }

    10%{

        opacity:1;

    }

    90%{

        opacity:1;

    }

    100%{

        transform:
            translateY(-20vh)
            scale(1.4);

        opacity:0;

    }

}

<script>
/* ==========================================================
                    ARES v1.0.5
                FOUNDATION JAVASCRIPT
========================================================== */

document.addEventListener("DOMContentLoaded", () => {

    initializeARES();

});

/* ==========================================================
                    INITIALIZATION
========================================================== */

function initializeARES(){

    initializeLoader();

    initializeNavbar();

    initializeHero();

    createParticles(60);

}

/* ==========================================================
                    LOADER
========================================================== */

function initializeLoader(){

    const loader=document.getElementById("loading-screen");

    setTimeout(()=>{

        gsap.to(loader,{

            opacity:0,

            duration:1,

            pointerEvents:"none",

            onComplete(){

                loader.style.display="none";

            }

        });

    },3500);

}

/* ==========================================================
                    HERO
========================================================== */

function initializeHero(){

    gsap.from(".hero-left",{

        y:70,

        opacity:0,

        duration:1.2,

        ease:"power3.out"

    });

    gsap.from(".hero-right",{

        x:80,

        opacity:0,

        duration:1.4,

        delay:.3,

        ease:"power3.out"

    });

}

/* ==========================================================
                    NAVBAR
========================================================== */

function initializeNavbar(){

    const nav=document.getElementById("navbar");

    window.addEventListener("scroll",()=>{

        if(window.scrollY>50){

            nav.style.background="rgba(5,7,14,.82)";

            nav.style.backdropFilter="blur(30px)";

        }

        else{

            nav.style.background="rgba(5,7,14,.55)";

        }

    });

}

/* ==========================================================
                    PARTICLES
========================================================== */

function createParticles(total){

    const container=document.getElementById("particles-layer");

    for(let i=0;i<total;i++){

        const particle=document.createElement("span");

        particle.className="particle";

        particle.style.left=Math.random()*100+"vw";

        particle.style.animationDuration=
        (8+Math.random()*12)+"s";

        particle.style.animationDelay=
        Math.random()*10+"s";

        particle.style.opacity=Math.random();

        container.appendChild(particle);

    }

}
