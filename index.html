<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES 3D Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* 3D Canvas */
canvas{
display:block;
}

/* Overlay UI */
#ui{
position:absolute;
top:40px;
width:100%;
text-align:center;
pointer-events:none;
}

h1{
font-size:55px;
letter-spacing:8px;
color:#D4AF37;
text-shadow:0 0 20px gold;
}

p{
margin-top:10px;
color:white;
font-size:18px;
letter-spacing:2px;
}

</style>
</head>

<body>

<div id="ui">
<h1>ARES</h1>
<p>3D Laboratory • Part 2</p>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.166.1/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.166.1/examples/jsm/controls/OrbitControls.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

// Camera
const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,6);

// Renderer
const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled=true;

document.body.appendChild(renderer.domElement);

// Orbit Controls
const controls = new OrbitControls(camera,renderer.domElement);

controls.enableDamping=true;
controls.enablePan=false;
controls.maxDistance=10;
controls.minDistance=3;

// Floor
const floor=new THREE.Mesh(
new THREE.CircleGeometry(8,64),
new THREE.MeshStandardMaterial({
color:0x111111
})
);

floor.rotation.x=-Math.PI/2;
floor.receiveShadow=true;
scene.add(floor);

// Ambient Light
scene.add(new THREE.AmbientLight(0xffffff,1.2));

// Gold Spotlight
const light=new THREE.SpotLight(0xffd700,80);

light.position.set(4,8,4);

light.castShadow=true;

scene.add(light);

// Placeholder Character
const character=new THREE.Mesh(

new THREE.CapsuleGeometry(0.5,1.5,8,16),

new THREE.MeshStandardMaterial({
color:0xD4AF37,
metalness:1,
roughness:0.25
})

);

character.castShadow=true;
character.position.y=1.2;

scene.add(character);

// Animation Loop

function animate(){

requestAnimationFrame(animate);

character.rotation.y+=0.005;

controls.update();

renderer.render(scene,camera);

}

animate();

// Resize

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
